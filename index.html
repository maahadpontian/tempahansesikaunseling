  if (!res.ok) { console.error("sbSelect err", await res.text()); return []; }
  return res.json();
}
async function sbInsert(table, rows) {
  const url = SB_URL+"/rest/v1/"+table;
  const res = await fetch(url, { method:"POST", headers: sbHeaders(), body: JSON.stringify(rows) });
  if (!res.ok) console.error("sbInsert err", await res.text());
}
async function sbUpsert(table, rows) {
  const h = {...sbHeaders(), "Prefer":"resolution=ignore-duplicates,return=minimal"};
  const url = SB_URL+"/rest/v1/"+table+"?on_conflict=room_name,date";
  const res = await fetch(url, { method:"POST", headers: h, body: JSON.stringify(rows) });
  if (!res.ok) console.error("sbUpsert err", await res.text());
}
async function sbDelete(table, filters) {
  let params = [];
  if (filters.eq) Object.entries(filters.eq).forEach(([k,v]) => params.push(k+"=eq."+encodeURIComponent(v)));
  if (filters.in) Object.entries(filters.in).forEach(([k,v]) => params.push(k+"=in.("+v.map(x=>encodeURIComponent(x)).join(",")+")" ));
  const url = SB_URL+"/rest/v1/"+table+"?"+params.join("&");
  const res = await fetch(url, { method:"DELETE", headers: sbHeaders() });
  if (!res.ok) console.error("sbDelete err", await res.text());
}
async function sbPatch(table, data, filters) {
  let params = [];
  if (filters.eq) Object.entries(filters.eq).forEach(([k,v]) => params.push(k+"=eq."+encodeURIComponent(v)));
  const url = SB_URL+"/rest/v1/"+table+"?"+params.join("&");
  const res = await fetch(url, { method:"PATCH", headers: sbHeaders(), body: JSON.stringify(data) });
  if (!res.ok) console.error("sbPatch err", await res.text());
}

// ─── DB helpers ───────────────────────────────────────────────────────
async function dbLoadBookings(date) {
  return sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME, date }, order:"created_at.asc" });
}
async function dbInsertBookings(date, bookings) {
  const rows = bookings.map(b => ({
    id: String(b.id), room_name: ROOM_NAME, date,
    slot: b.slot||null, mula: b.mula||null, tamat: b.tamat||null,
    nama: b.nama, status: b.status, masa: encodeCounselorMasa(b.masa||null,b.kaunselor||"",b.catatan||"",b.lanjutan||"")
  }));
  await sbInsert("bk_bookings", rows);
}
async function dbDeleteBooking(id) {
  await sbDelete("bk_bookings", { eq: { room_name: ROOM_NAME, id: String(id) } });
}
async function dbDeleteBySlots(date, slots) {
  await sbDelete("bk_bookings", { eq: { room_name: ROOM_NAME, date }, in: { slot: slots } });
}
async function dbUpdateStatus(id, status) {
  await sbPatch("bk_bookings", { status }, { eq: { room_name: ROOM_NAME, id: String(id) } });
}
async function dbUpdateMasa(id, masa) {
  await sbPatch("bk_bookings", { masa }, { eq: { room_name: ROOM_NAME, id: String(id) } });
}
async function dbLoadAllDates() {
  const rows = await sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME }, select:"date", order:"date.desc" });
  return [...new Set(rows.map(r=>r.date))].sort().reverse();
}
async function dbLoadAllCalData() {
  const rows = await sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME }, select:"date,slot", in: { slot: AVAIL_BIASA } });
  const counts = {};
  rows.forEach(r => { counts[r.date] = (counts[r.date]||0)+1; });
  return counts;
}
async function dbLoadHolidays() {
  const rows = await sbSelect("bk_holidays", { eq: { room_name: ROOM_NAME }, select:"date" });
  return rows.map(r=>r.date);
}
async function dbAddHoliday(date) { await sbUpsert("bk_holidays", [{ room_name: ROOM_NAME, date }]); }
async function dbRemoveHoliday(date) { await sbDelete("bk_holidays", { eq: { room_name: ROOM_NAME, date } }); }
async function dbLoadPersonBookings(nama) {
  return sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME, nama }, order:"date.desc" });
}
async function dbLoadMonthBookings(year, month) {
  const m = year+"-"+String(month).padStart(2,"0");
  return sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME }, like: { date: m+"%" } });
}
async function dbLoadRangeBookings(startDate, endDate) {
  const rows = await sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME }, order:"date.asc,created_at.asc" });
  return rows.filter(r => r.date >= startDate && r.date <= endDate);
}
async function dbLoadYearBookings(year) {
  return sbSelect("bk_bookings", { eq: { room_name: ROOM_NAME }, like: { date: year+"%" }, order:"date.asc,created_at.asc" });
}

// ─── Helpers ─────────────────────────────────────────────────────────
function todayStr() { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function isWeekend(ds) { const d=new Date(ds+"T00:00:00"); return d.getDay()===0||d.getDay()===6; }
function isCuti(ds,h) { return isWeekend(ds)||h.includes(ds); }
function timeToMins(t) { const [h,m]=t.split(":").map(Number); return h*60+m; }
function overlaps(a1,a2,b1,b2) { return a1<b2&&a2>b1; }
function cleanValue(v) { return String(v||"").trim(); }
function buildStudentLabel(name, kelas) {
  const nama = cleanValue(name);
  const ks = cleanValue(kelas);
  if(!nama || !ks) return "";
  return nama + " | " + ks;
}
function getStudentOptions(kelas) {
  return STUDENTS_BY_CLASS[kelas] || [];
}
function loadStudentProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if(!raw) return { studentName:"", studentKelas:"" };
    const parsed = JSON.parse(raw);
    return {
      studentName: cleanValue(parsed.studentName),
      studentKelas: cleanValue(parsed.studentKelas)
    };
  } catch (e) {
    return { studentName:"", studentKelas:"" };
  }
}
function saveStudentProfile(profile) {
  localStorage.setItem(PROFILE_KEY, JSON.stringify({
    studentName: cleanValue(profile.studentName),
    studentKelas: cleanValue(profile.studentKelas)
  }));
}
function firstMetaIndex(raw) {
  let cut = raw.length;
  [COUNSELOR_MARKER, NOTE_MARKER, EXT_MARKER].forEach(m=>{const i=raw.indexOf(m);if(i>=0&&i<cut)cut=i;});
  return cut;
}
function bookingMasaBase(b) {
  const raw = String((b && b.masa) || "");
  return raw.slice(0, firstMetaIndex(raw)).trim();
}
function readBookingMeta(b, marker) {
  const raw = String((b && b.masa) || "");
  const idx = raw.indexOf(marker);
  if(idx < 0) return "";
  const start = idx + marker.length;
  let end = raw.length;
  [COUNSELOR_MARKER, NOTE_MARKER, EXT_MARKER].forEach(m=>{if(m!==marker){const i=raw.indexOf(m,start);if(i>=0&&i<end)end=i;}});
  return raw.slice(start,end).trim();
}
function encodeCounselorMasa(masa, kaunselor, catatan, lanjutan) {
  const base = cleanValue(masa) || new Date().toLocaleTimeString("ms-MY");
  const k = cleanValue(kaunselor), note = cleanValue(catatan), ext = cleanValue(lanjutan);
  let out = base;
  if(k) out += COUNSELOR_MARKER + k;
  if(note) out += NOTE_MARKER + note;
  if(ext) out += EXT_MARKER + ext;
  return out || null;
}
function bookingCounselor(b) {
  const direct = cleanValue(b && b.kaunselor);
  if(direct) return direct;
  return readBookingMeta(b, COUNSELOR_MARKER);
}
function bookingNote(b) {
  const direct = cleanValue(b && b.catatan);
  return direct || readBookingMeta(b, NOTE_MARKER);
}
function bookingLanjutan(b) {
  const direct = cleanValue(b && b.lanjutan);
  return direct || readBookingMeta(b, EXT_MARKER);
}
function counselorLine(b) {
  const k = bookingCounselor(b);
  return k ? "Kaunselor: " + k : "Kaunselor: -";
}

function AnalisaGuru() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortBy, setSortBy] = useState("jumlah");
  const now = new Date();
  const months=["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogos","Sep","Okt","Nov","Dis"];

  useEffect(()=>{
    setLoading(true);
    sbSelect("bk_bookings",{eq:{room_name:ROOM_NAME},order:"date.asc"}).then(rows=>{
      const guruMap={};
      rows.forEach(b=>{
        if(!guruMap[b.nama]) guruMap[b.nama]={
          nama:b.nama, jumlah:0, lulusCount:0, pendingCount:0,
          slotCount:{}, monthCount:{}, firstDate:b.date, lastDate:b.date, dates:new Set()
        };
        const g=guruMap[b.nama];
        g.jumlah++;
        if(b.status==="lulus") g.lulusCount++; else g.pendingCount++;
        const slot=b.slot||(b.mula?"Cuti":"?");
        g.slotCount[slot]=(g.slotCount[slot]||0)+1;
        const m=b.date.substring(0,7);
        g.monthCount[m]=(g.monthCount[m]||0)+1;
        if(b.date>g.lastDate) g.lastDate=b.date;
        g.dates.add(b.date);
      });
      const list=Object.values(guruMap).map(g=>({
        ...g,
        hariUnik:g.dates.size,
        favSlot:Object.entries(g.slotCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"-",
        bulanAktif:Object.keys(g.monthCount).length
      }));
      setData(list);
      setLoading(false);
    });
  },[]);

  const sorted=[...data].sort((a,b)=>{
    if(sortBy==="jumlah") return b.jumlah-a.jumlah;
    if(sortBy==="hari") return b.hariUnik-a.hariUnik;
    if(sortBy==="nama") return a.nama.localeCompare(b.nama);
    return 0;
  });

  const top3=sorted.slice(0,3);
  const medals=["🥇","🥈","🥉"];
  const medalBg=["#fff7d6","#f1f5f9","#fff7d6"];
  const medalBorder=["#f59e0b","#e9d5ff","#d97706"];

  function cetakPDF() {
    const tarikh=new Date().toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"});
    const rows=sorted.map((g,i)=>`<tr>
      <td style="text-align:center;font-weight:700">${i+1}</td>
      <td>${g.nama}</td>
      <td style="text-align:center;font-weight:800;color:#7c3aed">${g.jumlah}</td>
      <td style="text-align:center">${g.hariUnik}</td>
      <td style="text-align:center">${g.bulanAktif}</td>
      <td style="text-align:center;font-size:11px">${g.favSlot}</td>

function AdminKaunselorPanel({bookings,date,onChanged}) {
  const [adminCounselor,setAdminCounselor]=useState(COUNSELOR_OPTIONS[0]);
  const [selectedId,setSelectedId]=useState("");
  const [note,setNote]=useState("");
  const [needExtend,setNeedExtend]=useState(false);
  const [extendDate,setExtendDate]=useState(date);
  const [extendSlot,setExtendSlot]=useState(SLOTS_LUAR[0]?.id||SLOTS_BIASA[0].id);
  const [saving,setSaving]=useState(false);
  const [localMsg,setLocalMsg]=useState(null);
  const counselorBookings=bookings.filter(b=>bookingCounselor(b)===adminCounselor).sort((a,b)=>(a.slot||a.mula||"").localeCompare(b.slot||b.mula||""));
  const selectedBooking=bookings.find(b=>b.id===selectedId);

  useEffect(()=>{setSelectedId("");setNote("");setNeedExtend(false);setExtendDate(date);setLocalMsg(null);},[adminCounselor,date]);

  function pickBooking(id){
    setSelectedId(id);
    const b=bookings.find(x=>x.id===id);
    setNote(b?bookingNote(b):"");
    setNeedExtend(false);
    setLocalMsg(null);
  }

  async function simpanTindakan(){
    if(!selectedBooking){setLocalMsg({type:"err",text:"Pilih rekod pelajar dahulu."});return;}
    const cleanNote=cleanValue(note);
    let targetBookings=[];
    if(needExtend){
      if(!extendDate||!extendSlot){setLocalMsg({type:"err",text:"Lengkapkan tarikh dan slot lanjutan."});return;}
      targetBookings=extendDate===date?bookings:await dbLoadBookings(extendDate);
      const sameCounselor=targetBookings.find(b=>b.slot===extendSlot&&bookingCounselor(b)===adminCounselor);
      const full=targetBookings.filter(b=>b.slot===extendSlot).length>=COUNSELOR_OPTIONS.length;
      if(sameCounselor){setLocalMsg({type:"err",text:"Kaunselor ini sudah ada tempahan pada slot lanjutan itu."});return;}
      if(full){setLocalMsg({type:"err",text:"Slot lanjutan itu sudah penuh untuk semua kaunselor."});return;}
    }
    setSaving(true);
    const masa=encodeCounselorMasa(bookingMasaBase(selectedBooking),adminCounselor,cleanNote,needExtend?"Ya":"");
    await dbUpdateMasa(selectedBooking.id,masa);
    if(needExtend){
      const asal=selectedBooking.slot||((selectedBooking.mula&&selectedBooking.tamat)?selectedBooking.mula+" - "+selectedBooking.tamat:"sesi asal");
      await dbInsertBookings(extendDate,[{
        id:String(Date.now()+Math.random()),slot:extendSlot,nama:selectedBooking.nama,kaunselor:adminCounselor,status:"lulus",
        masa:new Date().toLocaleTimeString("ms-MY"),catatan:(cleanNote?cleanNote+" | ":"")+"Sesi lanjutan daripada "+asal,lanjutan:"Ya"
      }]);
    }
    await onChanged();
    setSaving(false);
    setNeedExtend(false);
    setLocalMsg({type:"ok",text:needExtend?"Catatan disimpan dan sesi lanjutan ditambah.":"Catatan kaunselor disimpan."});
  }

  return React.createElement("div",{style:{background:S.card,border:"1px solid "+S.cardBorder,boxShadow:S.cardShadow,backdropFilter:"blur(14px)",borderRadius:20,padding:18,marginBottom:14}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",gap:12,alignItems:"flex-start",marginBottom:14}},
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:10,fontWeight:800,color:S.textDim,letterSpacing:2,textTransform:"uppercase",marginBottom:4}},"Tindakan Kaunselor"),
        React.createElement("div",{style:{fontSize:13,fontWeight:900,color:S.text}},"Catatan dan sesi lanjutan tambahan")
      ),
      React.createElement("div",{style:{fontSize:10,color:S.accent,fontWeight:800,background:S.accentDim,border:"1px solid "+S.accentBorder,borderRadius:999,padding:"5px 9px",whiteSpace:"nowrap"}},counselorBookings.length," rekod")
    ),
